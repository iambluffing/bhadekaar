</head>
<body>

<header class="header">
    <div class="container">

```
    <div class="logo">
        <a href="index.html" style="text-decoration:none;color:inherit;">
            <h2 style="margin:0;color:#0F172A;">BhadeKaar</h2>
        </a>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>

</div>
```

</header>

<section style="padding:80px 0;background:#F8FAFC;min-height:85vh;">

```
<div class="container">

    <div class="form-container">

        <h2 style="text-align:center;margin-bottom:10px;">
            Welcome Back
        </h2>

        <p style="text-align:center;color:#64748B;margin-bottom:30px;">
            Login to your BhadeKaar account
        </p>

        <label style="font-weight:600;">Login As</label>

        <select>
            <option>Customer</option>
            <option>Vendor</option>
        </select>

        <label style="font-weight:600;">Email Address</label>

        <input
            type="email"
            placeholder="Enter your email">

        <label style="font-weight:600;">Password</label>

        <input
            type="password"
            placeholder="Enter your password">

        <button>
            Login
        </button>

        <div style="margin-top:20px;text-align:center;">

            <p style="margin-bottom:15px;color:#64748B;">
                OR
            </p>

            <button
                style="
                background:#ffffff;
                color:#111827;
                border:1px solid #E5E7EB;
                margin-bottom:12px;">
                Continue with Google
            </button>

            <button
                style="
                background:#14B8A6;
                color:white;">
                Login with Phone OTP
            </button>

        </div>

        <hr style="margin:25px 0;">

        <p style="text-align:center;">

            New Vendor?

            <a href="vendor-register.html">
                Register Here
            </a>

        </p>

    </div>

</div>
```

</section>
